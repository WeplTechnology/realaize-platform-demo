const Dot = ({ color }) => <span style={{ width: 8, height: 8, borderRadius: "50%", background: color, display: "inline-block", flexShrink: 0 }}/>;

const priorityColor = (p) => p === "Alta" ? C.red : p === "Media" ? C.orange : C.textMuted;

// ── FICHA DETAIL MODAL ──
const FichaModal = ({ entity, type, onClose }) => {
  const [tab, setTab] = useState(0);
  if (!entity) return null;

  let tabs = [];
  let content = null;

  if (type === "asset") {
    const a = entity;
    tabs = ["General", "Financiero", "Funding", "Propuestas", "Matching", "Similares", "Docs", "Emails", "Tareas", "Historial"];
    const relatedProposals = PROPOSALS.filter(p => p.asset === a.name);
    const tabContents = [
      <div key="g" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
        {[["Nombre", a.name], ["Zona", a.zone], ["Tipología", a.type], ["Pipeline", a.pipeline], ["Gate", a.gate], ["Responsable", a.responsible], ["Superficie", a.m2], ["Precio", a.price]].map(([l, v], i) => (
          <div key={i} style={{ padding: 12, borderRadius: 8, background: C.bg }}>
            <div style={{ fontSize: 10, color: C.textMuted, textTransform: "uppercase", letterSpacing: 1 }}>{l}</div>
            <div style={{ fontSize: 14, color: C.text, fontWeight: 600, marginTop: 4 }}>{v}</div>
          </div>
        ))}
      </div>,
      <div key="f" style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12 }}>
        {[["Inversión Total", a.price], ["Equity Need", a.equity], ["ROI", a.roi], ["IRR", a.irr], ["Equity Levantado", a.equityRaised], ["Gap", a.equityRaised === "0" ? a.equity : "1.3M €"]].map(([l, v], i) => (
          <div key={i} style={{ padding: 16, borderRadius: 10, background: C.bg, textAlign: "center" }}>
            <div style={{ fontSize: 10, color: C.textMuted, letterSpacing: 1 }}>{l}</div>
            <div style={{ fontSize: 20, fontWeight: 800, color: i === 2 || i === 3 ? C.green : C.gold, marginTop: 6 }}>{v}</div>
          </div>
        ))}
      </div>,
      <div key="fu">
        <div style={{ display: "flex", gap: 12, marginBottom: 16 }}>
          {[["Equity Need", a.equity, C.gold], ["Comprometido", a.equityRaised, C.purple], ["Ingresado", a.equityRaised === "0" ? "0" : "0 €", C.green]].map(([l, v, c], i) => (
            <div key={i} style={{ flex: 1, padding: 16, borderRadius: 10, background: C.bg, textAlign: "center", borderTop: `3px solid ${c}` }}>
              <div style={{ fontSize: 10, color: C.textMuted }}>{l}</div>
              <div style={{ fontSize: 18, fontWeight: 800, color: c, marginTop: 4 }}>{v}</div>
            </div>
          ))}
        </div>
        <div style={{ padding: 12, borderRadius: 8, background: C.bg }}>
          <div style={{ fontSize: 12, fontWeight: 600, color: C.text, marginBottom: 8 }}>Propuestas de financiación</div>
          {relatedProposals.length > 0 ? relatedProposals.map((p, i) => (
            <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: `1px solid ${C.border}` }}>
              <span style={{ fontSize: 12, color: C.text }}>{p.counterpart}</span>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <span style={{ fontSize: 12, color: C.gold }}>{p.amount}</span>
                <Badge text={p.status} color={statusColor(p.status)} />
              </div>
            </div>
          )) : <div style={{ fontSize: 12, color: C.textMuted }}>Sin propuestas vinculadas</div>}
        </div>
      </div>,
      <div key="p">
        {relatedProposals.length > 0 ? relatedProposals.map((p, i) => (
          <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: 12, borderRadius: 8, background: C.bg, marginBottom: 8 }}>
            <div>
              <Badge text={p.type} color={p.type === "Inversión" ? C.green : p.type === "Operador" ? C.pink : p.type === "Lenders" ? C.purple : C.gold} />
              <span style={{ fontSize: 13, color: C.text, marginLeft: 10, fontWeight: 500 }}>{p.counterpart}</span>
            </div>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              <span style={{ fontSize: 12, color: C.textMuted }}>{p.amount}</span>
              <Badge text={p.status} color={statusColor(p.status)} />
            </div>
          </div>
        )) : <div style={{ color: C.textMuted, fontSize: 13 }}>Sin propuestas vinculadas</div>}
      </div>,
      <div key="m">
        <div style={{ fontSize: 12, fontWeight: 600, color: C.green, marginBottom: 8 }}>Inversores compatibles</div>
        {INVESTORS.slice(0, 3).map((inv, i) => (
          <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "8px 12px", borderRadius: 6, background: C.bg, marginBottom: 4 }}>
            <span style={{ fontSize: 12, color: C.text }}>{inv.name}</span>
            <span style={{ fontSize: 11, color: C.green }}>Score: {85 - i * 12}%</span>
          </div>
        ))}
        <div style={{ fontSize: 12, fontWeight: 600, color: C.pink, margin: "16px 0 8px" }}>Operadores compatibles</div>
        {OPERATORS.slice(0, 2).map((op, i) => (
          <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "8px 12px", borderRadius: 6, background: C.bg, marginBottom: 4 }}>
            <span style={{ fontSize: 12, color: C.text }}>{op.name}</span>
            <span style={{ fontSize: 11, color: C.pink }}>{op.type}</span>
          </div>
        ))}
      </div>,
    ];
    content = tabContents[tab] || <div style={{ color: C.textMuted, fontSize: 13, padding: 20, textAlign: "center" }}>Contenido de pestaña "{tabs[tab]}"</div>;
  } else if (type === "investor") {
    const inv = entity;
    tabs = ["General", "Necesidades", "Propuestas", "Matching", "Seguimiento", "Emails", "Docs", "Vínculos"];
    const relatedProposals = PROPOSALS.filter(p => p.counterpart === inv.name);
    const relatedNeeds = NEEDS.filter(n => n.investor === inv.name);
    const tabContents = [
      <div key="g" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
        {[["Nombre", inv.name], ["Tipo", inv.type], ["Categoría", inv.category], ["Ticket", inv.ticket], ["Estado", inv.status], ["Responsable", inv.responsible], ["Último contacto", inv.lastContact], ["Geografía", inv.geo]].map(([l, v], i) => (
          <div key={i} style={{ padding: 12, borderRadius: 8, background: C.bg }}>
            <div style={{ fontSize: 10, color: C.textMuted, textTransform: "uppercase", letterSpacing: 1 }}>{l}</div>
            <div style={{ fontSize: 14, color: C.text, fontWeight: 600, marginTop: 4 }}>{v}</div>
          </div>
        ))}
      </div>,
      <div key="n">
        {relatedNeeds.length > 0 ? relatedNeeds.map((n, i) => (
          <div key={i} style={{ padding: 14, borderRadius: 8, background: C.bg, marginBottom: 8 }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
              <Badge text={n.status} color={statusColor(n.status)} />
              <span style={{ fontSize: 11, color: C.green }}>{n.matches} matches</span>
            </div>
            <div style={{ fontSize: 13, color: C.text }}>{n.criteria}</div>
          </div>
        )) : <div style={{ color: C.textMuted, fontSize: 13 }}>Sin necesidades registradas</div>}
      </div>,
      <div key="p">
        {relatedProposals.length > 0 ? relatedProposals.map((p, i) => (
          <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: 12, borderRadius: 8, background: C.bg, marginBottom: 8 }}>
            <div>
              <div style={{ fontSize: 13, color: C.text, fontWeight: 500 }}>{p.asset}</div>
              <div style={{ fontSize: 11, color: C.textMuted }}>{p.type} · {p.amount}</div>
            </div>
            <Badge text={p.status} color={statusColor(p.status)} />
          </div>
        )) : <div style={{ color: C.textMuted, fontSize: 13 }}>Sin propuestas</div>}
      </div>,
    ];
    content = tabContents[tab] || <div style={{ color: C.textMuted, fontSize: 13, padding: 20, textAlign: "center" }}>Contenido de pestaña "{tabs[tab]}"</div>;
  }

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 1000, display: "flex", justifyContent: "center", alignItems: "center" }} onClick={onClose}>
      <div style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.7)", backdropFilter: "blur(4px)" }}/>
      <div onClick={e => e.stopPropagation()} style={{ position: "relative", width: "85%", maxWidth: 900, maxHeight: "85vh", background: C.card, borderRadius: 16, border: `1px solid ${C.border}`, overflow: "hidden", display: "flex", flexDirection: "column" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "16px 24px", borderBottom: `1px solid ${C.border}`, background: C.navy }}>
          <div>
            <div style={{ fontSize: 18, fontWeight: 800, color: C.text }}>{entity.name}</div>
            <div style={{ display: "flex", gap: 8, marginTop: 4 }}>
              {entity.gate && <Badge text={entity.gate} color={statusColor(entity.gate)} />}
              {entity.status && <Badge text={entity.status} color={statusColor(entity.status)} />}
              {entity.pipeline && <Badge text={entity.pipeline} color={C.gold} />}
              {entity.category && <Badge text={entity.category} color={C.blue} />}
            </div>
          </div>
          <button onClick={onClose} style={{ background: "none", border: "none", color: C.textMuted, fontSize: 24, cursor: "pointer", padding: 4 }}>✕</button>
        </div>
        <div style={{ display: "flex", gap: 2, padding: "8px 24px", borderBottom: `1px solid ${C.border}`, overflowX: "auto", flexShrink: 0 }}>
          {tabs.map((t, i) => (
            <button key={i} onClick={() => setTab(i)} style={{
              padding: "8px 14px", borderRadius: 8, border: "none", cursor: "pointer", fontSize: 12, fontWeight: 600, whiteSpace: "nowrap",
              background: tab === i ? C.gold + "20" : "transparent", color: tab === i ? C.gold : C.textMuted,
            }}>{t}</button>
          ))}
        </div>
        <div style={{ padding: 24, overflowY: "auto", flex: 1 }}>{content}</div>
      </div>
    </div>
  );
};

const KanbanCol = ({ title, items, color, onCardClick }) => (

      <Dot color={color || C.gold} />

      <span style={{ fontSize: 11, color: C.textMuted, background: C.bg, padding: "2px 8px", borderRadius: 10 }}>{items.length}</span>
    </div>
    <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
      {items.map((item, i) => (
        <div key={i} onClick={() => onCardClick && onCardClick(item)} style={{
          padding: 14, borderRadius: 10, background: C.card, border: `1px solid ${C.border}`,

                <div style={{ width: 18, height: 18, borderRadius: 4, border: `2px solid ${priorityColor(t.priority)}`, flexShrink: 0, cursor: "pointer" }}/>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 13, color: C.text, fontWeight: 500 }}>{t.text}</div>
                  <div style={{ display: "flex", gap: 8, marginTop: 4 }}>
                    <span style={{ fontSize: 11, color: C.textMuted }}>{t.entity}</span>
                    <Badge text={t.type} color={t.type === "Activo" ? C.gold : t.type === "Propuesta" ? C.green : t.type === "Operador" ? C.pink : t.type === "Lender" ? C.purple : C.blue} />
                  </div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontSize: 12, fontWeight: 600, color: t.due === "Hoy" ? C.red : C.textMuted }}>{t.due}</div>
                  <Badge text={t.priority} color={priorityColor(t.priority)} />
                </div>
              </div>
            ))}
          </div>
        )}

        {sub === "w-emails" && (
          <div style={{ background: C.card, borderRadius: 12, border: `1px solid ${C.border}`, padding: 40, textAlign: "center" }}>
            <div style={{ fontSize: 40, marginBottom: 12 }}>✉</div>
            <div style={{ fontSize: 16, fontWeight: 700, color: C.text }}>Integración Email</div>
            <div style={{ fontSize: 13, color: C.textMuted, marginTop: 8, maxWidth: 400, margin: "8px auto 0" }}>
              Fase 2 — Sync bidireccional con Gmail. Cliente de email integrado con vinculación manual de hilos a entidades.
            </div>
            <div style={{ display: "flex", justifyContent: "center", gap: 8, marginTop: 20 }}>
              {["Ver emails", "Responder", "Vincular a activo", "Vincular a inversor"].map(f => (
                <span key={f} style={{ padding: "6px 12px", borderRadius: 8, background: C.blue + "15", color: C.blue, fontSize: 11, fontWeight: 600 }}>{f}</span>
              ))}
            </div>
          </div>
        )}

        {sub === "w-calendar" && (
          <div style={{ background: C.card, borderRadius: 12, border: `1px solid ${C.border}`, padding: 24 }}>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 2, marginBottom: 4 }}>
              {["Lun", "Mar", "Mié", "Jue", "Vie", "Sáb", "Dom"].map(d => (
                <div key={d} style={{ fontSize: 11, fontWeight: 700, color: C.textMuted, textAlign: "center", padding: 8 }}>{d}</div>
              ))}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 2 }}>
              {Array.from({ length: 31 }, (_, i) => {
                const hasTasks = [2, 3, 9, 10, 14, 17, 22, 25].includes(i);
                const isToday = i === 8;
                return (
                  <div key={i} style={{
                    padding: 10, borderRadius: 8, textAlign: "center", minHeight: 50,
                    background: isToday ? C.gold + "15" : hasTasks ? C.card : "transparent",
                    border: isToday ? `1px solid ${C.gold}40` : `1px solid transparent`,
                  }}>
                    <div style={{ fontSize: 13, fontWeight: isToday ? 800 : 400, color: isToday ? C.gold : C.text }}>{i + 1}</div>
                    {hasTasks && <div style={{ width: 5, height: 5, borderRadius: "50%", background: C.gold, margin: "4px auto 0" }}/>}
                  </div>
                );
              })}
            </div>
            <div style={{ marginTop: 12, fontSize: 11, color: C.textMuted, textAlign: "center" }}>Sync bidireccional con Google Calendar & Google Tasks</div>
          </div>
        )}
      </div>
    );
  };

  // ── NOTIFICATIONS PANEL ──
  const NotifPanel = () => (
    <div style={{ position: "absolute", top: 50, right: 16, width: 360, background: C.card, borderRadius: 12, border: `1px solid ${C.border}`, boxShadow: "0 16px 48px rgba(0,0,0,0.5)", zIndex: 900, maxHeight: 400, overflow: "auto" }}>
      <div style={{ padding: "14px 18px", borderBottom: `1px solid ${C.border}`, fontSize: 14, fontWeight: 700, color: C.text }}>Notificaciones</div>
      {[
        { text: "Match: Al Rashid ↔ Hotel Boutique Málaga", time: "5h", color: C.orange, icon: "⚡" },
        { text: "Nordic Capital comprometió 1.5M € en Hotel Málaga", time: "1d", color: C.green, icon: "✓" },
        { text: "CaixaBank envió term sheet para BTR Bilbao", time: "1d", color: C.purple, icon: "📋" },
        { text: "Flex Living Barcelona sin movimiento (5 días)", time: "2d", color: C.red, icon: "⚠" },
        { text: "3 tareas vencidas", time: "2d", color: C.red, icon: "⏰" },
        { text: "Green Bridge Capital sin contactar (2+ semanas)", time: "3d", color: C.orange, icon: "📞" },
      ].map((n, i) => (
        <div key={i} style={{ display: "flex", gap: 10, padding: "12px 18px", borderBottom: `1px solid ${C.border}`, cursor: "pointer" }}
          onMouseEnter={e => e.currentTarget.style.background = C.cardHover} onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
          <span style={{ fontSize: 14, width: 20, textAlign: "center" }}>{n.icon}</span>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 12, color: C.text, lineHeight: 1.4 }}>{n.text}</div>
            <div style={{ fontSize: 10, color: C.textMuted, marginTop: 2 }}>Hace {n.time}</div>
          </div>
          <Dot color={n.color} />
        </div>
      ))}
    </div>
  );

  const currentSection = nav === "dashboard" ? renderDashboard() : nav === "pipeline" ? renderPipeline() : nav === "crm" ? renderCRM() : nav === "workspace" ? renderWorkspace() :
    <div style={{ padding: 40, textAlign: "center" }}><div style={{ fontSize: 40, marginBottom: 12 }}>⚙</div><div style={{ fontSize: 16, fontWeight: 700, color: C.text }}>Configuración</div><div style={{ fontSize: 13, color: C.textMuted, marginTop: 8 }}>Roles, permisos y ajustes del sistema</div></div>;

  return (
    <div style={{ display: "flex", height: "100vh", background: C.bg, fontFamily: "'Inter', -apple-system, system-ui, sans-serif", overflow: "hidden" }}>
      {/* SIDEBAR */}
      <nav style={{ width: 210, flexShrink: 0, background: C.navy, borderRight: `1px solid ${C.border}`, display: "flex", flexDirection: "column", overflowY: "auto" }}>
        <div style={{ padding: "20px 16px 16px", borderBottom: `1px solid ${C.border}` }}>
          <div style={{ fontSize: 16, fontWeight: 800, color: C.gold, letterSpacing: 0.5 }}>REALAIZE</div>
          <div style={{ fontSize: 10, color: C.textMuted, letterSpacing: 1.5, marginTop: 2 }}>CAPITAL CRM</div>
        </div>
        <div style={{ padding: "12px 8px", flex: 1 }}>
          {navItems.map(item => (
            <div key={item.id}>
              <button onClick={() => handleNav(item.id)} style={{
                display: "flex", alignItems: "center", gap: 10, width: "100%", padding: "10px 12px", marginBottom: 2,
                borderRadius: 8, border: "none", cursor: "pointer", textAlign: "left", fontSize: 13, fontWeight: 600,
                background: nav === item.id ? C.gold + "12" : "transparent",
                color: nav === item.id ? C.gold : C.textMuted, transition: "all 0.15s",
              }}>
                <span style={{ fontSize: 14, width: 20, textAlign: "center" }}>{item.icon}</span>
                {item.label}
                {item.children && <span style={{ marginLeft: "auto", fontSize: 10, transform: sideExpanded[item.id] ? "rotate(90deg)" : "none", transition: "transform 0.2s" }}>▸</span>}
              </button>
              {item.children && sideExpanded[item.id] && (
                <div style={{ paddingLeft: 20, marginBottom: 4 }}>
                  {item.children.map(child => (
                    <button key={child.id} onClick={() => handleNav(item.id, child.id)} style={{
                      display: "block", width: "100%", padding: "7px 12px", borderRadius: 6, border: "none", cursor: "pointer",
                      textAlign: "left", fontSize: 12, fontWeight: subNav === child.id ? 600 : 400,
                      background: subNav === child.id ? C.gold + "10" : "transparent",
                      color: subNav === child.id ? C.gold : C.textMuted,
                    }}>{child.label}</button>
                  ))}
                </div>
              )}
            </div>
          ))}
        </div>
        <div style={{ padding: "12px 16px", borderTop: `1px solid ${C.border}` }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ width: 30, height: 30, borderRadius: "50%", background: C.gold + "25", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700, color: C.gold }}>WE</div>
            <div>
              <div style={{ fontSize: 12, fontWeight: 600, color: C.text }}>Admin</div>
              <div style={{ fontSize: 10, color: C.textMuted }}>we@realaize.capital</div>
            </div>
          </div>
        </div>
      </nav>

      {/* MAIN */}
      <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
        {/* HEADER */}
        <header style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "0 24px", height: 52, borderBottom: `1px solid ${C.border}`, background: C.navy, flexShrink: 0, position: "relative" }}>
          <div style={{ fontSize: 13, color: C.textMuted }}>
            {nav === "dashboard" ? "Dashboard" : nav === "pipeline" ? `Pipeline → ${(navItems.find(n => n.id === "pipeline")?.children?.find(c => c.id === subNav)?.label) || "Assets"}` : nav === "crm" ? `CRM → ${(navItems.find(n => n.id === "crm")?.children?.find(c => c.id === subNav)?.label) || "Activos"}` : nav === "workspace" ? `Área de Trabajo → ${(navItems.find(n => n.id === "workspace")?.children?.find(c => c.id === subNav)?.label) || "Tareas"}` : "Configuración"}
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
            <button onClick={() => setNotifOpen(!notifOpen)} style={{ background: "none", border: "none", cursor: "pointer", position: "relative", padding: 4 }}>
              <span style={{ fontSize: 18 }}>🔔</span>
              <div style={{ position: "absolute", top: 0, right: 0, width: 16, height: 16, borderRadius: "50%", background: C.red, fontSize: 9, color: "white", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800 }}>6</div>
            </button>
          </div>
          {notifOpen && <NotifPanel />}
        </header>

        {/* CONTENT */}
        <main style={{ flex: 1, overflow: "auto", padding: 24 }} onClick={() => notifOpen && setNotifOpen(false)}>
          {currentSection}
        </main>
      </div>

      {/* FICHA MODAL */}
      {modal && <FichaModal entity={modal} type={modalType} onClose={() => { setModal(null); setModalType(null); }} />}
    </div>
  );
}

    // Render
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
